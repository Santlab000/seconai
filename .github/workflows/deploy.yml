name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Run JS actions on Node.js 24 (Node 20 is being deprecated on the runners)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Allow the workflow to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, don't cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 24 ships npm 11, matching the npm that generated the lockfile
          node-version: 24
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        # Use `npm install` rather than `npm ci`: the Windows-generated
        # lockfile omits some Linux-only optional deps of sharp
        # (@emnapi/*), which makes strict `npm ci` fail on the runner.
        run: npm install --no-audit --no-fund

      - name: Build static export
        run: npm run build

      - name: Disable Jekyll (serve _next assets)
        run: touch ./out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
